<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b14;--card:#0d1320;--card-border:#1a2540;--card-hover:#111b30;
  --blue:#3b82f6;--blue-dim:#1e3a6e;--cyan:#22d3ee;--gold:#f59e0b;--gold-dim:#78500a;
  --silver:#94a3b8;--bronze:#d97706;--green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --text:#e2e8f0;--text-dim:#e2e8f0;--text-muted:#cbd5e1;
  --glow:0 0 20px rgba(59,130,246,0.15);
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes slideRight{from{width:0}to{width:var(--w)}}
@keyframes gaugeAnim{from{stroke-dashoffset:var(--circ)}to{stroke-dashoffset:var(--offset)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(59,130,246,0.2)}50%{box-shadow:0 0 20px rgba(59,130,246,0.4)}}
.fade-up{animation:fadeUp .4s ease-out both}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:#2a3a5a}
.card-head{padding:16px 20px 12px;border-bottom:1px solid var(--card-border)}
.card-body{padding:14px 20px 18px}
.card-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.3px}
.card-sub{font-size:10px;color:var(--text-dim);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}
.glow-border{animation:glow 3s ease-in-out infinite}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
canvas{max-width:100%!important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<div id="error-display" style="display:none;background:#1a0000;color:#ff6666;padding:20px;margin:20px;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;border:1px solid #ff3333"></div>
<script>
window.addEventListener("error", function (event) {
  var msg = event.message || "Unknown error";
  var line = event.lineno || "";
  var col = event.colno || "";
  var stack = event.error && event.error.stack ? event.error.stack : "";

  var el = document.getElementById("error-display");

  if (el) {
    el.style.display = "block";
    el.textContent =
      "ERROR: " + msg +
      "\nLine: " + line +
      " Col: " + col +
      "\n" + stack;
  }

  console.error("Dashboard Error:", msg, stack);
});
</script>

function aggregate(rows,cogsMap){

  let maxDate=null;rows.forEach(r=>{if(r.od&&(!maxDate||r.od>maxDate))maxDate=r.od});
  let we=maxDate?new Date(maxDate):new Date();const dow=we.getDay();we.setDate(we.getDate()-(dow===6?0:dow+1));
  const ws=new Date(we);ws.setDate(ws.getDate()-6);

    let mk=null,wk=null;
    if(r.od){mk=r.od.toISOString().slice(0,7);const iso=getISOWeek(r.od);wk=`${iso[0]}-W${String(iso[1]).padStart(2,'0')}`}

    if(!d1[aR])d1[aR]={s:0,o:0};if(isSh)d1[aR].s+=r.rev;if(isOp)d1[aR].o+=r.rev;
    if(["CAN","USA","DTC"].includes(aR)&&ch!=="EU"){
      if(!d2[ch])d2[ch]={s:0,o:0,c:0,ms:0,mc:0};if(isSh){d2[ch].s+=r.rev;d2[ch].c+=r.cost}if(isOp)d2[ch].o+=r.rev;if(r.mgn!==null){d2[ch].ms+=r.mgn;d2[ch].mc++}
      const cn=r.cr.split("-")[0].trim();if(ch==="Key Accounts")d2ka[cn]=(d2ka[cn]||0)+r.rev;if(ch==="Specialty")d2sp[cn]=(d2sp[cn]||0)+r.rev;
    }

    if(["CAN","USA","DTC"].includes(aR)&&dr!=="NO SALES CREDIT"){
      if(!d4[dr])d4[dr]={t:0,w:0,c:0,ms:0,mc:0,s:0,o:0};d4[dr].t+=r.rev;d4[dr].c+=r.cost;if(isSh)d4[dr].s+=r.rev;if(isOp)d4[dr].o+=r.rev;if(r.mgn!==null){d4[dr].ms+=r.mgn;d4[dr].mc++}if(isRec)d4[dr].w+=r.rev;
      if(mk){if(!mNA[mk])mNA[mk]={};mNA[mk][dr]=(mNA[mk][dr]||0)+r.rev}
      if(wk){if(!wTrend[wk])wTrend[wk]={na:0,eu:0};wTrend[wk].na+=r.rev}
    }
    if(["CAN","USA","DTC"].includes(aR)&&["Sticks","Custom Skates","Stock Skates","Custom Goalie","Stock Goalie","Other"].includes(cat)&&dr!=="NO SALES CREDIT"){
      if(!d5[cat])d5[cat]={};d5[cat][dr]=(d5[cat][dr]||0)+r.rev;

  const d2D={ka:Object.entries(d2ka).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([n,t])=>({name:n,total:t})),sp:Object.entries(d2sp).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([n,t])=>({name:n,total:t}))};
  const d3O=["KA - Big 4","KA - Top 10","Others"].map(tier=>{const v=d3[tier]||{s:0,o:0};return{tier,shipped:v.s,open:v.o,total:v.s+v.o}}).filter(t=>t.total>0);
  const fR=d=>Object.entries(d).map(([rep,v])=>{const b=(REP_BUDGETS[rep]||{}).f||0;const profit=v.t-v.c;const gm=v.mc>0?Math.round((v.ms/v.mc)*10)/10:null;return{rep,total:v.t,shipped:v.s||0,open:v.o||0,pct:b>0?Math.round(v.t/b*1000)/10:null,weekly:v.w,hb:b>0,budget:b,ca:isCA(rep),gm,profit:Math.round(profit*100)/100}});
  const fC=d=>{const o={};for(const cat of["Sticks","Custom Skates","Stock Skates","Custom Goalie","Stock Goalie","Other"]){const e=Object.entries(d[cat]||{}).sort((a,b)=>b[1]-a[1]).slice(0,10);o[cat]=e.map(([rep,total])=>{const cb=(CAT_BUDGETS[rep]||{})[cat]||0;return{rep,total,cb,pct:cb>0?Math.round(total/cb*1000)/10:null,ca:isCA(rep)}})}return o};

  const fM=d=>{const o={};for(const m of Object.keys(d).sort()){o[m]=Object.entries(d[m]).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([rep,total])=>({rep,total:Math.round(total*100)/100}))}return o};
  const wks=Object.keys(wTrend).sort().slice(-12);
  const wT=wks.map(w=>({week:w,na:Math.round(wTrend[w].na*100)/100,eu:Math.round(wTrend[w].eu*100)/100}));
  const cM=[];for(const cat of["Sticks","Custom Skates","Stock Skates","Custom Goalie","Stock Goalie","Other"]){let t=0;if(d5[cat])for(const v of Object.values(d5[cat]))t+=v;const cc=catCost[cat]||0;const profit=t-cc;const cm=catMgn[cat]||{ms:0,mc:0};cM.push({category:cat,total:Math.round(t*100)/100,gm:cm.mc>0?Math.round((cm.ms/cm.mc)*10)/10:null,profit:Math.round(profit*100)/100})}

  return{as_of_date:maxDate?maxDate.toISOString().slice(0,10):"Unknown",d1:d1O,d2:d2O,d2_drill:d2D,d3:d3O,d4:fR(d4),d5:fC(d5),d6:fR(d6),d7:fC(d7),monthly_na:fM(mNA),monthly_eu:fM(mEU),weekly_trend:wT,category_mix:cM,channel_margin:[...d2O,euEntry]};

function getISOWeek(d){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);const w1=new Date(t.getFullYear(),0,4);return[t.getFullYear(),1+Math.round(((t-w1)/864e5-3+(w1.getDay()+6)%7)/7)]}

function parseCSV(text){
  const r=Papa.parse(text,{header:true,skipEmptyLines:true});
  const rows=[]; let sk=0;

  const parseCost=(row)=>{
    let v=row.COSTSALES;
    if(v&&typeof v==="string"&&v.startsWith("="))v=null;
    let c=parseFloat(v);
    if(isNaN(c)||c===0){
      let v2=row.ITEM_COST;
      if(v2&&typeof v2==="string"&&v2.startsWith("="))v2=null;
      const ic=parseFloat(v2);
      if(!isNaN(ic)&&ic>0){
        const qty=parseFloat(row.Quantity)||parseFloat(row.QTY)||1;
        c=ic*qty
      }
    }
    return(!isNaN(c)&&c>0)?c:0
  };

  r.data.forEach(row=>{
    const rep=(row.SALESREP_NAME||"").trim();
    const reg=(row.REGION||"").trim();
    if(!rep||!reg){sk++;return}

    const py=parseInt(row.PERIOD_YEAR);
    if(py&&py!==2026){sk++;return}

    let od=null;
    if(row.ORDERED_DATE){
      const d=new Date(row.ORDERED_DATE);
      if(!isNaN(d))od=d
    }

    const itemNo=(row.ITEM_NUMBER||row.ITEM||"").trim();
    const qty=parseFloat(row.ORDERED_QUANTITY)||parseFloat(row.Quantity)||parseFloat(row.QTY)||1;
    const cost = parseCost(row);

    rows.push({
      rep,
      reg,
      pt: (row.PRODUCT_TYPE || "").trim(),
      cr: (row.CUSTOMER_ROLLUP_NAME || "").trim(),
      ot: (row.ORDER_TYPE || "").trim(),
      of: (row.OPEN_FLAG || "").trim(),
      rev: parseFloat(row.Sales) || 0,
      cost,
      od,
      terr: (row.TERRITORY_NAME || "").trim(),
      itemNo,
      qty,
      mgn: (cost && cost !== 0)
        ? (() => {
            const v = parseFloat(row["MARGIN%"]);
            return !isNaN(v) ? v : null;
          })()
        : null
    });
  }); 

  return { rows, total: r.data.length, skipped: sk, parsed: rows.length };

const fmt=(n,c)=>{const s=c==="CAD"?"C$":"$";const v=c==="CAD"?n*FX:n;return v>=1e6?`${s}${(v/1e6).toFixed(2)}M`:v>=1e3?`${s}${(v/1e3).toFixed(1)}K`:`${s}${v.toFixed(0)}`};
const fmtShort=(n)=>n>=1e6?`${(n/1e6).toFixed(1)}M`:n>=1e3?`${(n/1e3).toFixed(0)}K`:`${n.toFixed(0)}`;
const fmtName=(n)=>{if(!n)return"";n=n.replace(/\s*\(.*?\)\s*/g,"").trim();return n.split(" ").map(w=>w.split("-").map(p=>p.charAt(0).toUpperCase()+p.slice(1).toLowerCase()).join("-")).join(" ").replace(/Mcn/g,"McN").replace(/Mcp/g,"McP")};
const fmtLB=(n)=>{if(n==="Key Accounts Canada")return"🇨🇦 KA Canada";if(n==="Key Accounts US")return"🇺🇸 KA US";return fmtName(n)};

/* ══════════════════════════════════════════════════════════════════
   SVG GAUGE COMPONENT
   ══════════════════════════════════════════════════════════════════ */
function Gauge({value, size=140, stroke=12, label, sub}) {
  const r = (size-stroke)/2;
  const circ = 2*Math.PI*r;
  const pct = value != null ? Math.min(value/100, 1.5) : 0;
  const offset = circ*(1-pct*0.75);
  const color = value===null?"var(--text-muted)":value>=60?"var(--green)":value>=45?"var(--blue)":value>=35?"var(--amber)":"var(--red)";

  return (
    <div style={{textAlign:"center",position:"relative",width:size,height:size*0.85, margin:"0 auto"}}>
      <svg
        width={size}
        height={size*0.85}
        viewBox={`0 0 ${size} ${size*0.85}`}
        style={{display:"block", margin:"0 auto"}}
      >
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--card-border)" strokeWidth={stroke}
          strokeDasharray={`${circ*0.75} ${circ*0.25}`} strokeLinecap="round"
          transform={`rotate(135 ${size/2} ${size/2})`}
        />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          transform={`rotate(135 ${size/2} ${size/2})`}
          style={{transition:"stroke-dashoffset 1.2s ease-out",filter:`drop-shadow(0 0 6px ${color})`}}
        />
      </svg>

      <div style={{position:"absolute",top:"38%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
        <div className="mono" style={{fontSize:size*0.22,fontWeight:800,color}}>{value!=null?`${value}%`:"N/A"}</div>
        {label&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:2,letterSpacing:1,textTransform:"uppercase"}}>{label}</div>}
      </div>

      {sub&&<div className="mono" style={{fontSize:11,color:"var(--text-dim)",fontWeight:600,marginTop:-6,textAlign:"center"}}>{sub}</div>}
    </div>
  );
}

function BarChart({labels, datasets, horizontal=false, height=280, showLabels=false}) {
  const ref = useRef(null); const chartRef = useRef(null);

    if(chartRef.current)chartRef.current.destroy();

    chartRef.current=new Chart(ref.current,{
      type:"bar",
      data:{labels,datasets:datasets.map(ds=>({...ds,borderRadius:4,borderSkipped:false}))},
      plugins:[dlPlugin],
      options:{indexAxis:horizontal?"y":"x",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,labels:{color:"#e2e8f0",font:{family:"Outfit",size:11}}},tooltip:{backgroundColor:"#1e293b",titleColor:"#e2e8f0",bodyColor:"#e2e8f0",borderColor:"#334155",borderWidth:1,cornerRadius:8,titleFont:{family:"Outfit"},bodyFont:{family:"JetBrains Mono",size:11},callbacks:{label:ctx=>`$${ctx.raw>=1e6?(ctx.raw/1e6).toFixed(2)+"M":(ctx.raw/1e3).toFixed(1)+"K"}`}}},scales:{x:{grid:{color:"#1a2540",drawBorder:false},ticks:{color:"#cbd5e1",font:{family:"Outfit",size:10}},border:{display:false}},y:{grid:{color:"#1a2540",drawBorder:false},ticks:{color:"#cbd5e1",font:{family:horizontal?"Outfit":"JetBrains Mono",size:horizontal?11:10},callback:horizontal?undefined:v=>fmtShort(v)},border:{display:false}}},animation:{duration:800,easing:"easeOutQuart"}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy()};
  },[labels,datasets,showLabels]);
  return <div style={{height,position:"relative"}}><canvas ref={ref}/></div>;
}

function parseWeeklyCSV(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const reps=[],cats=[];let mode=null,weekLabel="Weekly Incoming Orders";
  for(const line of lines){
    const cols=line.split(",").map(c=>c.trim().replace(/^"|"$/g,""));
    const h=cols[0].toUpperCase();
    if(h==="REPS"||h==="REP"||h==="SALES REP"){mode="rep";continue}
    if(h==="CATEGORY"||h==="CATEGORIES"||h==="PRODUCT CATEGORY"){mode="cat";continue}
    if(h==="GRAND TOTAL"||h==="TOTAL")continue;
    if(h==="WEEK"||h.startsWith("WEEK ENDING")){weekLabel=cols.length>1?cols[1]:cols[0];continue}
    if(!mode)continue;
    const name=cols[0];const val=parseFloat((cols[1]||"0").replace(/[$,%]/g,""));
    if(!name||isNaN(val))continue;
    if(mode==="rep"){
      const gm=cols[2]?parseFloat(cols[2].replace(/[$,%]/g,"")):null;
      reps.push({rep:name,total:val,gm:(!isNaN(gm)&&gm!==null)?gm:null});
    }
    else cats.push({cat:name,total:val});
  }
  return{week_label:weekLabel,reps:reps.sort((a,b)=>b.total-a.total),cats:cats.sort((a,b)=>b.total-a.total)};
}

/* ══════════════════════════════════════════════════════════════════
   TAB 1: SCOREBOARD
   ══════════════════════════════════════════════════════════════════ */
function Scoreboard({data,ccy,masterTeam,weeklyOrders,workhorse}) {
  const [sbRegion,setSbRegion]=useState("global");
  const [naView,setNaView]=useState("total");

  const isEliteRep=(n)=>ELITE_REPS.has(n);
  const teamFilt=(list)=>{
    if(masterTeam==="all")return list;
    if(masterTeam==="elite")return list.filter(r=>isEliteRep(r.rep));
    return list.filter(r=>!isEliteRep(r.rep)||DUAL_REPS.has(r.rep));
  };

  const glob=data.d1.find(r=>r.region==="GLOBAL");
  const allRegions=data.d1.filter(r=>r.region!=="GLOBAL");
  const canRow=data.d1.find(r=>r.region==="CAN")||{shipped:0,open:0,total:0,budget:0,pct:null};
  const usaRow=data.d1.find(r=>r.region==="USA")||{shipped:0,open:0,total:0,budget:0,pct:null};
  const euRow=data.d1.find(r=>r.region==="Europe/ROW")||{shipped:0,open:0,total:0,budget:0,pct:null};
  const naTotal={region:"NA",shipped:canRow.shipped+usaRow.shipped,open:canRow.open+usaRow.open,total:canRow.total+usaRow.total,budget:VIEW_BUDGETS.na,pct:VIEW_BUDGETS.na>0?Math.round((canRow.total+usaRow.total)/VIEW_BUDGETS.na*1000)/10:null};

  // Override region-level budgets with VIEW_BUDGETS (authoritative, no double-counting)
  const globView={...glob,budget:VIEW_BUDGETS.global,pct:VIEW_BUDGETS.global>0?Math.round(glob.total/VIEW_BUDGETS.global*1000)/10:null};
  const euView={...euRow,budget:VIEW_BUDGETS.eu,pct:VIEW_BUDGETS.eu>0?Math.round(euRow.total/VIEW_BUDGETS.eu*1000)/10:null};
  const hero=sbRegion==="global"?globView:sbRegion==="na"?naTotal:euView;

  // NA drill-down: Retail = KA + Specialty, Elite = Elite/Pro channel, DTC
  const kaCh=data.d2.find(c=>c.channel==="Key Accounts")||{shipped:0,open:0,total:0};
  const spCh=data.d2.find(c=>c.channel==="Specialty")||{shipped:0,open:0,total:0};
  const elCh=data.d2.find(c=>c.channel==="Elite/Pro")||{shipped:0,open:0,total:0};
  const dtcCh=data.d2.find(c=>c.channel==="DTC")||{shipped:0,open:0,total:0};
  const retailBudget=(CHANNEL_BUDGETS["Key Account N-A"]||0)+(CHANNEL_BUDGETS["Specialty N-A"]||0);
  const retailTotal=kaCh.total+spCh.total;
  const retailHero={region:"Retail",shipped:kaCh.shipped+spCh.shipped,open:kaCh.open+spCh.open,total:retailTotal,budget:retailBudget,pct:retailBudget>0?Math.round(retailTotal/retailBudget*1000)/10:null};
  const eliteBudget=CHANNEL_BUDGETS["Elite"]||0;
  const eliteHero={region:"Elite",shipped:elCh.shipped,open:elCh.open,total:elCh.total,budget:eliteBudget,pct:eliteBudget>0?Math.round(elCh.total/eliteBudget*1000)/10:null};
  const dtcBudget=CHANNEL_BUDGETS["DTC"]||0;
  const dtcHero={region:"DTC",shipped:dtcCh.shipped,open:dtcCh.open,total:dtcCh.total,budget:dtcBudget,pct:dtcBudget>0?Math.round(dtcCh.total/dtcBudget*1000)/10:null};

  // When team filter active, recompute hero from rep-level data for accurate budgets
  const teamHero=useMemo(()=>{
    if(masterTeam==="all")return null;
    const na=teamFilt(data.d4);const eu=teamFilt(data.d6);
    const naT=na.reduce((s,r)=>s+r.total,0);const naB=na.reduce((s,r)=>s+(r.budget||0),0);
    const naS=na.reduce((s,r)=>s+(r.shipped||0),0);const naO=na.reduce((s,r)=>s+(r.open||0),0);
    const euT=eu.reduce((s,r)=>s+r.total,0);const euB=eu.reduce((s,r)=>s+(r.budget||0),0);
    const euS=eu.reduce((s,r)=>s+(r.shipped||0),0);const euO=eu.reduce((s,r)=>s+(r.open||0),0);
    const tot=naT+euT;const bud=naB+euB;const totS=naS+euS;const totO=naO+euO;
    return{
      global:{region:"GLOBAL",total:tot,shipped:totS,open:totO,budget:bud,pct:bud>0?Math.round(tot/bud*1000)/10:null},
      na:{region:"NA",total:naT,shipped:naS,open:naO,budget:naB,pct:naB>0?Math.round(naT/naB*1000)/10:null},
      eu:{region:"Europe/ROW",total:euT,shipped:euS,open:euO,budget:euB,pct:euB>0?Math.round(euT/euB*1000)/10:null}
    };
  },[masterTeam,data.d4,data.d6]);

  const heroFinal=(()=>{
    if(teamHero){
      let th;
      if(sbRegion==="global")th=teamHero.global;
      else if(sbRegion==="eu")th=teamHero.eu;
      else th=teamHero.na;
      // Fallback: if rep-level shipped/open unavailable, use d1-based values
      if(th.shipped===0&&th.open===0&&th.total>0){
        const base=sbRegion==="global"?globView:sbRegion==="eu"?euView:naTotal;
        return{...th,shipped:base.shipped,open:base.open};
      }
      return th;
    }
    if(sbRegion==="na"&&naView==="retail")return retailHero;
    if(sbRegion==="na"&&naView==="elite")return eliteHero;
    if(sbRegion==="na"&&naView==="dtc")return dtcHero;
    return hero;
  })();

  // Filtered weekly reps for team toggle
  const fWeekReps=useMemo(()=>{
    if(!weeklyOrders||!weeklyOrders.reps.length)return[];
    let list=weeklyOrders.reps.filter(r=>r.total>0);
    if(masterTeam==="retail")list=list.filter(r=>!isEliteRep(r.rep)||DUAL_REPS.has(r.rep));
    if(masterTeam==="elite")list=list.filter(r=>isEliteRep(r.rep));
    return list.sort((a,b)=>b.total-a.total);
  },[weeklyOrders,masterTeam]);

  // SUTHERLAND'S 3 Stars — point computation (PC-eligible reps only)
  const starPoints=useMemo(()=>{
    const pts={};const el=(n)=>PC_ELIGIBLE.has(n);
    // Revenue points from weekly orders: #1=40, #2=30, #3=20
    const revPts=[40,30,20];
    fWeekReps.filter(r=>el(r.rep)).slice(0,3).forEach((r,i)=>{pts[r.rep]=(pts[r.rep]||{rev:0,gm:0,wh:0});pts[r.rep].rev=revPts[i]});
    // GM points: rank by weekly GM% from upload (fallback to YTD if no weekly GM data)
    const gmPts=[40,30,20];
    const weekGM=fWeekReps.filter(r=>r.gm!=null&&el(r.rep)).sort((a,b)=>(b.gm||0)-(a.gm||0));
    if(weekGM.length>0){
      weekGM.slice(0,3).forEach((r,i)=>{pts[r.rep]=(pts[r.rep]||{rev:0,gm:0,wh:0});pts[r.rep].gm=gmPts[i]});
    } else {
      const allGM=teamFilt([...data.d4,...data.d6]).filter(r=>r.gm!=null&&r.total>0&&el(r.rep)).sort((a,b)=>(b.gm||0)-(a.gm||0));
      allGM.slice(0,3).forEach((r,i)=>{pts[r.rep]=(pts[r.rep]||{rev:0,gm:0,wh:0});pts[r.rep].gm=gmPts[i]});
    }
    // Workhorse points from manual input
    (workhorse||[]).forEach(w=>{if(w.rep&&w.rep.trim()&&el(w.rep.trim())){pts[w.rep.trim()]=(pts[w.rep.trim()]||{rev:0,gm:0,wh:0});pts[w.rep.trim()].wh=w.pts}});
    // Build sorted array
    return Object.entries(pts).map(([rep,p])=>({rep,rev:p.rev,gm:p.gm,wh:p.wh,total:p.rev+p.gm+p.wh})).sort((a,b)=>b.total-a.total);
  },[fWeekReps,data.d4,data.d6,masterTeam,workhorse]);

  // EU sub-region aggregation from d6
  const euSubRegions=useMemo(()=>{
    const subs={};
    Object.keys(EU_SUB).forEach(k=>{subs[k]={region:k,shipped:0,open:0,total:0,budget:0,pct:null}});
    (data.d6||[]).forEach(r=>{
      const sub=getEUSub(r.rep);
      subs[sub].total+=r.total||0;
      if(r.budget)subs[sub].budget+=r.budget;
    });
    Object.values(subs).forEach(s=>{if(s.budget>0)s.pct=Math.round(s.total/s.budget*1000)/10});
    return Object.values(subs);
  },[data.d6]);

  const gauges=useMemo(()=>{
    if(sbRegion==="eu")return euSubRegions;
    if(sbRegion==="na"){
      if(naView==="retail"){
        const kaB=CHANNEL_BUDGETS["Key Account N-A"]||0;
        const spB=CHANNEL_BUDGETS["Specialty N-A"]||0;
        return[
          {region:"Key Accounts",shipped:kaCh.shipped,open:kaCh.open,total:kaCh.total,budget:kaB,pct:kaB>0?Math.round(kaCh.total/kaB*1000)/10:null},
          {region:"Specialty",shipped:spCh.shipped,open:spCh.open,total:spCh.total,budget:spB,pct:spB>0?Math.round(spCh.total/spB*1000)/10:null}
        ];
      }
      if(naView==="elite")return[];
      if(naView==="dtc")return[];
      return[canRow,usaRow];
    }
    // Global: CAN, USA, EU/ROW + Elite + DTC channel gauges
    const eliteGauge={region:"Elite",shipped:elCh.shipped,open:elCh.open,total:elCh.total,budget:CHANNEL_BUDGETS["Elite"]||0,pct:CHANNEL_BUDGETS["Elite"]>0?Math.round(elCh.total/CHANNEL_BUDGETS["Elite"]*1000)/10:null};

/* ══════════════════════════════════════════════════════════════════
   TAB 2: LEADERBOARDS — NA Retail Stack & Track
   ══════════════════════════════════════════════════════════════════ */
function Leaderboards({data,ccy,masterTeam,weeklyOrders}) {
  const [region,setRegion]=useState("NA");
  const [revPeriod,setRevPeriod]=useState("week");
  // GM% rankings - YTD only

  // Filter to LB-eligible reps only, then by region
  const reps=useMemo(()=>{
    const eligible=data.d4.filter(r=>LB_REPS.has(r.rep));
    if(region==="CAN")return eligible.filter(r=>r.ca);
    if(region==="USA")return eligible.filter(r=>!r.ca);
    return eligible;
  },[data,region]);

  // Weekly revenue from upload (matched to LB reps)
  const weekRevReps=useMemo(()=>{
    if(!weeklyOrders||!weeklyOrders.reps.length)return[];
    return weeklyOrders.reps.filter(r=>r.total>0&&LB_REPS.has(r.rep)).sort((a,b)=>b.total-a.total);
  },[weeklyOrders]);

  // Weekly reps filtered by region
  const weekByRegion=useMemo(()=>{
    let list=weekRevReps;
    if(region==="CAN")list=list.filter(wr=>{const d=reps.find(r=>r.rep===wr.rep);return d&&d.ca});
    if(region==="USA")list=list.filter(wr=>{const d=reps.find(r=>r.rep===wr.rep);return d&&!d.ca});
    return list;
  },[weekRevReps,reps,region]);

  // 3 metric rankings — YTD
  const byBudget=useMemo(()=>[...reps].filter(r=>r.hb&&r.pct!=null).sort((a,b)=>b.pct-a.pct),[reps]);
  const byGMytd=useMemo(()=>[...reps].filter(r=>r.gm!=null&&r.total>25000).sort((a,b)=>(b.gm||0)-(a.gm||0)),[reps]);
  const byRevYtd=useMemo(()=>[...reps].filter(r=>r.total>0).sort((a,b)=>b.total-a.total),[reps]);

  // Active data based on toggles
  const byGM=byGMytd;
  const byRev=revPeriod==="week"?weekByRegion:byRevYtd;

  // Podiums always use weekly
  const podiumRev=weekByRegion;
  const podiumGM=byGMytd;
  const podiumBudget=byBudget;

  const regionLabel=region==="CAN"?"🇨🇦 Canada":region==="USA"?"🇺🇸 USA":"🇨🇦🇺🇸 North America";
  const gmColor=(gm)=>gm>=50?"var(--green)":gm>=40?"var(--gold)":"var(--red)";

  const TogBtn=({active,onClick,children})=>(
    <button onClick={onClick} style={{padding:"7px 18px",borderRadius:8,background:active?"var(--blue)":"var(--card)",border:active?"none":"1px solid var(--card-border)",color:active?"#fff":"var(--text-dim)",fontSize:12,fontWeight:700,transition:"all .15s"}}>{children}</button>
  );

  // ── PODIUM COMPONENT — Clean top-3 spotlight ──
  const Podium=({title,icon,data:pData,valFn,colorFn,subFn})=>{
    const top3=pData.slice(0,3);
    if(top3.length===0)return null;
    const medals=["🥇","🥈","🥉"];
    const bgColors=["rgba(245,158,11,0.08)","rgba(148,163,184,0.06)","rgba(180,83,9,0.05)"];
    const borderColors=["rgba(245,158,11,0.25)","rgba(148,163,184,0.15)","rgba(180,83,9,0.12)"];

    return(
      <div className="card" style={{marginBottom:0,overflow:"hidden"}}>
        <div style={{padding:"12px 16px 8px",borderBottom:"1px solid var(--card-border)"}}>
          <div style={{fontSize:13,fontWeight:800}}>{icon} {title}</div>
        </div>
        <div style={{padding:0}}>
          {top3.map((r,i)=>{
            const isGold=i===0;
            return(
              <div key={r.rep} style={{padding:isGold?"16px 16px 14px":"10px 16px",background:bgColors[i],borderBottom:i<2?`1px solid ${borderColors[i]}`:"none",display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:isGold?24:18,flexShrink:0}}>{medals[i]}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:isGold?14:12,fontWeight:800,color:isGold?"var(--gold)":"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtLB(r.rep)}</div>
                  {subFn&&<div className="mono" style={{fontSize:9,color:"var(--text-muted)",marginTop:1}}>{subFn(r)}</div>}
                </div>
                <div className="mono" style={{fontSize:isGold?22:16,fontWeight:900,color:colorFn?colorFn(r):isGold?"var(--gold)":"var(--text)",flexShrink:0}}>{valFn(r)}</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ── FULL RANKING TABLE ──
  const RankTable=({title,icon,data:tData,valFn,colorFn,subFn,emptyMsg})=>(
    <div className="card" style={{marginBottom:20}}>
      <div className="card-head" style={{padding:"14px 20px 10px"}}>
        <div className="card-title" style={{fontSize:15}}>{icon} {title}</div>
        <div className="card-sub">{regionLabel} • {tData.length} reps</div>
      </div>
      <div className="card-body" style={{maxHeight:500,overflowY:"auto"}}>
        {tData.length>0?tData.map((r,i)=>(

  );

  return(
    <div className="fade-up">

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,letterSpacing:-.3}}>🏆 Leaderboard — Stack & Track</div>
          <div style={{fontSize:11,color:"var(--text-dim)",marginTop:2}}>NA Retail Reps • {reps.length} reps tracked</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[["NA","🇨🇦🇺🇸 NA"],["CAN","🇨🇦 CAN"],["USA","🇺🇸 USA"]].map(([v,l])=>(
            <TogBtn key={v} active={region===v} onClick={()=>setRegion(v)}>{l}</TogBtn>
          ))}

      </div>

      {/* ═══ PODIUM ROW — Top 3 Quick View ═══ */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:20}}>
        <Podium title="% to Budget" icon="🏅"
          data={podiumBudget}
          valFn={(r,raw)=>raw?r.pct:`${r.pct}%`}
          colorFn={(r)=>pctCol(r.pct)}

        <Podium title="Gross Margin" icon="📈"

      <RankTable title="% to Budget — Full Rankings" icon="🏅"
        data={byBudget}
        valFn={(r,raw)=>raw?r.pct:`${r.pct}%`}
        colorFn={(r)=>pctCol(r.pct)}

      {/* GM% Rankings with period toggle */}
      <div className="card" style={{marginBottom:20}}>

        </div>
        <div className="card-body" style={{maxHeight:500,overflowY:"auto"}}>
          {byGM.length>0?byGM.map((r,i)=>(
            <div key={r.rep} style={{display:"flex",alignItems:"center",gap:10,padding:i===0?"10px 0 8px":"7px 0",borderBottom:"1px solid var(--card-border)"}}>
              <div style={{width:i===0?32:26,height:i===0?32:26,borderRadius:"50%",background:i<3?medalCol(i):"var(--card-border)",color:i<3?"#000":"var(--text-dim)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:i===0?14:10,fontWeight:800,flexShrink:0,boxShadow:i===0?"0 0 12px rgba(245,158,11,0.3)":"none"}}>{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:i===0?15:12,fontWeight:i===0?800:600,color:i===0?"var(--gold)":"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtLB(r.rep)}</div>
                <div style={{background:"var(--card-border)",borderRadius:3,height:i===0?7:4,marginTop:3,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:3,background:`linear-gradient(90deg,${gmColor(r.gm)},${gmColor(r.gm)}aa)`,width:`${Math.min(r.gm,100)}%`,transition:"width .8s"}}/>
                </div>

              <div style={{textAlign:"right",flexShrink:0,minWidth:90}}>

                <div className="mono" style={{fontSize:9,color:"var(--text-muted)",marginTop:1}}>{fmt(r.total,ccy)}</div>

            </div>
          )):<div style={{padding:20,textAlign:"center",color:"var(--text-muted)",fontSize:13}}>No reps meet $25K minimum</div>}
        </div>
      </div>

      {/* Revenue Rankings with period toggle */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-head" style={{padding:"14px 20px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

            <div className="card-title" style={{fontSize:15}}>💰 Revenue — Full Rankings</div>
            <div className="card-sub">{regionLabel} • {byRev.length} reps</div>
          </div>
          <div style={{display:"flex",gap:4}}>
            <TogBtn active={revPeriod==="week"} onClick={()=>setRevPeriod("week")}>{weeklyOrders?weeklyOrders.week_label:"This Week"}</TogBtn>
            <TogBtn active={revPeriod==="ytd"} onClick={()=>setRevPeriod("ytd")}>YTD</TogBtn>
          </div>
        </div>
        <div className="card-body" style={{maxHeight:500,overflowY:"auto"}}>
          {byRev.length>0?byRev.map((r,i)=>(
            <div key={r.rep} style={{display:"flex",alignItems:"center",gap:10,padding:i===0?"10px 0 8px":"7px 0",borderBottom:"1px solid var(--card-border)"}}>
              <div style={{width:i===0?32:26,height:i===0?32:26,borderRadius:"50%",background:i<3?medalCol(i):"var(--card-border)",color:i<3?"#000":"var(--text-dim)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:i===0?14:10,fontWeight:800,flexShrink:0,boxShadow:i===0?"0 0 12px rgba(245,158,11,0.3)":"none"}}>{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:i===0?15:12,fontWeight:i===0?800:600,color:i===0?"var(--gold)":"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtLB(r.rep)}</div>
                <div style={{background:"var(--card-border)",borderRadius:3,height:i===0?7:4,marginTop:3,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:3,background:i===0?"linear-gradient(90deg,var(--gold),#fbbf24)":i<3?"linear-gradient(90deg,var(--blue),var(--cyan))":"var(--blue-dim)",width:`${Math.min((byRev[0]?r.total/byRev[0].total*100:0),100)}%`,transition:"width .8s"}}/>
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,minWidth:90}}>
                <div className="mono" style={{fontSize:i===0?18:14,fontWeight:800,color:i===0?"var(--gold)":"var(--text)"}}>{fmt(r.total,ccy)}</div>

          )):<div style={{padding:20,textAlign:"center",color:"var(--text-muted)",fontSize:13}}>No data</div>}

    </div>
