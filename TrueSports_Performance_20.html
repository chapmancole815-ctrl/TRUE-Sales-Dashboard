function aggregate(rows){
  let maxDate=null;rows.forEach(r=>{if(r.od&&(!maxDate||r.od>maxDate))maxDate=r.od});

  const mNA={},mEU={},wTrend={};

    const dtc=r.ot.toUpperCase().includes("DTC")&&!r.cr.toUpperCase().includes("TRUE ATHLETE");
    const aR=r.cr.toUpperCase().includes("INTERNATIONAL RETAIL")?"Europe/ROW":(r.reg==="CAN"?"CAN":r.reg==="USA"?"USA":"Europe/ROW");

    let isRec=false;if(r.od){isRec=r.od>=ws&&r.od<=new Date(we.getTime()+7*864e5)}
    let mk=null,wk=null;
    if(r.od){mk=r.od.toISOString().slice(0,7);const iso=getISOWeek(r.od);wk=`${iso[0]}-W${String(iso[1]).padStart(2,'0')}`}

    if(!d1[aR])d1[aR]={s:0,o:0};if(isSh)d1[aR].s+=r.rev;if(isOp)d1[aR].o+=r.rev;
    if(["CAN","USA","DTC"].includes(aR)&&ch!=="EU"){
      if(!d2[ch])d2[ch]={s:0,o:0};if(isSh)d2[ch].s+=r.rev;if(isOp)d2[ch].o+=r.rev;
      const cn=r.cr.split("-")[0].trim();if(ch==="Key Accounts")d2ka[cn]=(d2ka[cn]||0)+r.rev;if(ch==="Specialty")d2sp[cn]=(d2sp[cn]||0)+r.rev;

    if(["CAN","USA","DTC"].includes(aR)&&["Sticks","Custom Skates","Stock Skates","Custom Goalie","Stock Goalie","Other"].includes(cat)&&dr!=="NO SALES CREDIT"){
      if(!d5[cat])d5[cat]={};d5[cat][dr]=(d5[cat][dr]||0)+r.rev;

      if(wk){if(!wTrend[wk])wTrend[wk]={na:0,eu:0};wTrend[wk].eu+=r.rev}
    }

const fmtShort=(n)=>n>=1e6?`${(n/1e6).toFixed(1)}M`:n>=1e3?`${(n/1e3).toFixed(0)}K`:`${n.toFixed(0)}`;

/* ══════════════════════════════════════════════════════════════════
   SVG GAUGE COMPONENT
   ══════════════════════════════════════════════════════════════════ */
function Gauge({value, size=140, stroke=12, label, sub}) {
  const r = (size-stroke)/2;
  const circ = 2*Math.PI*r;
  const pct = value != null ? Math.min(value/100, 1.5) : 0;
  const offset = circ*(1-pct*0.75);
  const color = value===null?"var(--text-muted)":value>=60?"var(--green)":value>=45?"var(--blue)":value>=35?"var(--amber)":"var(--red)";
  return (
    <div style={{textAlign:"center",position:"relative",width:size,height:size*0.85}}>
      <svg width={size} height={size*0.85} viewBox={`0 0 ${size} ${size*0.85}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--card-border)" strokeWidth={stroke} strokeDasharray={`${circ*0.75} ${circ*0.25}`} strokeLinecap="round" transform={`rotate(135 ${size/2} ${size/2})`}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform={`rotate(135 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset 1.2s ease-out",filter:`drop-shadow(0 0 6px ${color})`}}/>
      </svg>
      <div style={{position:"absolute",top:"38%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
        <div className="mono" style={{fontSize:size*0.22,fontWeight:800,color}}>{value!=null?`${value}%`:"N/A"}</div>
        {label&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:2,letterSpacing:1,textTransform:"uppercase"}}>{label}</div>}
      </div>
      {sub&&<div className="mono" style={{fontSize:11,color:"var(--text-dim)",fontWeight:600,marginTop:-6,textAlign:"center"}}>{sub}</div>}
    </div>
  );
}

function parseWeeklyCSV(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const reps=[],cats=[];let mode=null,weekLabel="Weekly Incoming Orders";
  for(const line of lines){
    const cols=line.split(",").map(c=>c.trim().replace(/^"|"$/g,""));
    const h=cols[0].toUpperCase();
    if(h==="REPS"||h==="REP"||h==="SALES REP"){mode="rep";continue}
    if(h==="CATEGORY"||h==="CATEGORIES"||h==="PRODUCT CATEGORY"){mode="cat";continue}
    if(h==="GRAND TOTAL"||h==="TOTAL")continue;
    if(h==="WEEK"||h.startsWith("WEEK ENDING")){weekLabel=cols.length>1?cols[1]:cols[0];continue}
    if(!mode)continue;
    const name=cols[0];const val=parseFloat((cols[1]||"0").replace(/[$,]/g,""));
    if(!name||isNaN(val))continue;
    if(mode==="rep")reps.push({rep:name,total:val});
    else cats.push({cat:name,total:val});
  }
  return{week_label:weekLabel,reps:reps.sort((a,b)=>b.total-a.total),cats:cats.sort((a,b)=>b.total-a.total)};
}

  };

  const glob=data.d1.find(r=>r.region==="GLOBAL");

  const canRow=data.d1.find(r=>r.region==="CAN")||{shipped:0,open:0,total:0,budget:0,pct:null};
  const usaRow=data.d1.find(r=>r.region==="USA")||{shipped:0,open:0,total:0,budget:0,pct:null};
  const euRow=data.d1.find(r=>r.region==="Europe/ROW")||{shipped:0,open:0,total:0,budget:0,pct:null};
  const naTotal={region:"NA",shipped:canRow.shipped+usaRow.shipped,open:canRow.open+usaRow.open,total:canRow.total+usaRow.total,budget:canRow.budget+usaRow.budget,pct:canRow.budget+usaRow.budget>0?Math.round((canRow.total+usaRow.total)/(canRow.budget+usaRow.budget)*1000)/10:null};

  const teamHero=useMemo(()=>{
    if(masterTeam==="all")return null;

    const tot=naT+euT;const bud=naB+euB;

              ):<div style={{padding:16,color:"var(--text-muted)",fontSize:12,textAlign:"center"}}>No category data — include CATEGORY section in upload</div>}
            </div>

      {/* ⭐ 3 STARS OF THE WEEK */}
      {fWeekReps.length>=3&&(
        <div className="card" style={{marginBottom:16,overflow:"hidden"}}>
          <div style={{background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",padding:"20px 24px 16px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <div>
                <div style={{fontSize:18,fontWeight:900,color:"#fff",letterSpacing:-.3}}>⭐ 3 Stars of the Week</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:2}}>{weeklyOrders.week_label} — Top incoming orders</div>
              </div>
              <div className="mono" style={{fontSize:22,fontWeight:900,color:"var(--gold)"}}>{fmt(fWeekReps.slice(0,3).reduce((s,r)=>s+r.total,0),ccy)}</div>
            </div>
          </div>
          <div className="card-body" style={{padding:"0"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0}}>
              {fWeekReps.slice(0,3).map((r,i)=>{
                const starIcons=["⭐","⭐⭐","⭐⭐⭐"];
                const starLabels=["1ST STAR","2ND STAR","3RD STAR"];
                const starBg=[
                  "linear-gradient(180deg,rgba(245,158,11,0.12) 0%,transparent 100%)",
                  "linear-gradient(180deg,rgba(148,163,184,0.1) 0%,transparent 100%)",
                  "linear-gradient(180deg,rgba(180,83,9,0.08) 0%,transparent 100%)"
                ];
                const starBorder=i<2?"1px solid var(--card-border)":"none";
                return(
                  <div key={r.rep} style={{padding:"20px 18px",background:starBg[i],borderRight:starBorder,textAlign:"center"}}>
                    <div style={{fontSize:i===0?28:22,marginBottom:6}}>{starIcons[i]}</div>
                    <div style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:2,fontWeight:700,marginBottom:6}}>{starLabels[i]}</div>
                    <div style={{fontSize:i===0?16:14,fontWeight:800,color:i===0?"var(--gold)":"var(--text)",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.rep}</div>
                    <div className="mono" style={{fontSize:i===0?22:18,fontWeight:900,color:i===0?"var(--gold)":"var(--text)"}}>{fmt(r.total,ccy)}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* CHARTS ROW */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <div className="card">
          <div className="card-head"><div className="card-title">Channel Mix</div><div className="card-sub">{sbRegion==="eu"?"EU sub-region":"NA"} revenue</div></div>
          <div className="card-body">{sbRegion==="eu"?(()=>{
            const subs={};Object.keys(EU_SUB).forEach(k=>{subs[k]=0});
            (data.d6||[]).forEach(r=>{subs[getEUSub(r.rep)]+=r.total||0});
            const labels=Object.keys(subs);const vals=labels.map(k=>subs[k]);const cols=labels.map(k=>EU_SUB_COLORS[k]);
            return <DoughnutChart labels={labels} data={vals} colors={cols}/>;
          })():<DoughnutChart labels={chLabels} data={chData} colors={chColors}/>}</div>
        </div>
        <div className="card">
          <div className="card-head"><div className="card-title">Category Mix</div><div className="card-sub">Revenue by product</div></div>
          <div className="card-body"><DoughnutChart labels={catLabels} data={catData} colors={catColors}/></div>
        </div>
      </div>

      {/* TREND LINE */}
      <div className="card" style={{marginBottom:16}}>
        <div className="card-head"><div className="card-title">📈 Weekly Sales Trend</div><div className="card-sub">Last 12 weeks • NA vs EU</div></div>
        <div className="card-body">
          <LineChart labels={trendLabels} datasets={[
            {label:"NA",data:trendNA,borderColor:"#3b82f6",backgroundColor:"rgba(59,130,246,0.08)",pointBackgroundColor:"#3b82f6"},
            {label:"EU",data:trendEU,borderColor:"#22d3ee",backgroundColor:"rgba(34,211,238,0.08)",pointBackgroundColor:"#22d3ee"}
          ]} height={220}/>
        </div>
      </div>

      {/* CATEGORY PERFORMANCE VS BUDGET */}
      {(()=>{
        const catColorsMap={"Sticks":"#3b82f6","Custom Skates":"#22d3ee","Stock Skates":"#10b981","Custom Goalie":"#8b5cf6","Stock Goalie":"#f59e0b"};
        const catBudgetTotals={};
        Object.keys(CAT_BUDGETS).forEach(function(rep){Object.keys(CAT_BUDGETS[rep]).forEach(function(cat){catBudgetTotals[cat]=(catBudgetTotals[cat]||0)+CAT_BUDGETS[rep][cat]})});
        return(
          <div className="card">
            <div className="card-head"><div className="card-title">📦 Product Category Performance vs Budget</div><div className="card-sub">NA — YTD (Shipped + Open) vs Annual Budget</div></div>
            <div className="card-body">
              {data.category_mix.map((cm,idx)=>{
                const bud=catBudgetTotals[cm.category]||0;
                const pct=bud>0?Math.round(cm.total/bud*1000)/10:null;
                return(
                  <div key={cm.category} style={{padding:"12px 0",borderBottom:idx<data.category_mix.length-1?"1px solid var(--card-border)":"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:10,height:10,borderRadius:5,background:catColorsMap[cm.category]||"#64748b"}}/>
                        <span style={{fontSize:14,fontWeight:700}}>{cm.category}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:16}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1}}>YTD</div>
                          <div className="mono" style={{fontSize:14,fontWeight:700}}>{fmt(cm.total,ccy)}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1}}>Budget</div>
                          <div className="mono" style={{fontSize:14,fontWeight:600,color:"var(--text-dim)"}}>{bud>0?fmt(bud,ccy):"N/A"}</div>
                        </div>
                        <div style={{background:pct===null?"var(--card-border)":pct>=50?"rgba(16,185,129,0.15)":pct>=35?"rgba(245,158,11,0.15)":"rgba(239,68,68,0.15)",border:`1px solid ${pctCol(pct)}33`,borderRadius:8,padding:"6px 12px",minWidth:64,textAlign:"center"}}>
                          <div className="mono" style={{fontSize:18,fontWeight:800,color:pctCol(pct)}}>{pct!=null?`${pct}%`:"N/A"}</div>
                        </div>
                      </div>
                    </div>
                    <div style={{background:"var(--card-border)",borderRadius:4,height:8,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:4,background:`linear-gradient(90deg,${catColorsMap[cm.category]||"#64748b"},${catColorsMap[cm.category]||"#64748b"}aa)`,width:`${pct!=null?Math.min(pct/100*100,100):0}%`,transition:"width 1s"}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   TAB 2: LEADERBOARDS
   ══════════════════════════════════════════════════════════════════ */
function Leaderboards({data,ccy,masterTeam,weeklyOrders}) {
  const [region,setRegion]=useState("NA");

  const isEliteRep=(n)=>ELITE_REPS.has(n);
  const tf=(list)=>{
    if(masterTeam==="all")return list;
    if(masterTeam==="elite")return list.filter(r=>isEliteRep(r.rep));
    return list.filter(r=>!isEliteRep(r.rep));
  };

  // Region-filtered reps
  const reps=useMemo(()=>{
    const na=tf(data.d4).map(r=>({...r,_eu:false}));
    const eu=tf(data.d6).map(r=>({...r,_eu:true}));
    if(region==="ALL")return[...na,...eu];
    if(region==="EU")return eu;
    if(region==="CAN")return na.filter(r=>r.ca);
    if(region==="USA")return na.filter(r=>!r.ca);
    return na;
  },[data,masterTeam,region]);

  // S1: This Week — apply team filter
  const weekReps=useMemo(()=>{
    if(!weeklyOrders||!weeklyOrders.reps.length)return[];
    let list=weeklyOrders.reps.filter(r=>r.total>0);
    if(masterTeam==="retail")list=list.filter(r=>!isEliteRep(r.rep));
    if(masterTeam==="elite")list=list.filter(r=>isEliteRep(r.rep));
    return list.sort((a,b)=>b.total-a.total);
  },[weeklyOrders,masterTeam]);
  const weekTotal=weekReps.reduce((s,r)=>s+r.total,0);

  // S2: Pace to Budget
  const paceReps=useMemo(()=>[...reps].filter(r=>r.hb&&r.pct!=null).sort((a,b)=>b.pct-a.pct),[reps]);

  // S3: Gross Margin
  const gmReps=useMemo(()=>[...reps].filter(r=>r.gm!=null&&r.total>25000).sort((a,b)=>(b.gm||0)-(a.gm||0)),[reps]);

  // S4: YTD Revenue
  const revReps=useMemo(()=>[...reps].filter(r=>r.total>0).sort((a,b)=>b.total-a.total),[reps]);

  const regionLabel=region==="ALL"?"🌍 Global":region==="EU"?"🇪🇺 Europe":region==="CAN"?"🇨🇦 Canada":region==="USA"?"🇺🇸 USA":"🇨🇦🇺🇸 North America";

  const TogBtn=({active,onClick,children})=>(
    <button onClick={onClick} style={{padding:"7px 18px",borderRadius:8,background:active?"var(--blue)":"var(--card)",border:active?"none":"1px solid var(--card-border)",color:active?"#fff":"var(--text-dim)",fontSize:12,fontWeight:700,transition:"all .15s"}}>{children}</button>
  );

  const gmColor=(gm)=>gm>=50?"var(--green)":gm>=40?"var(--gold)":"var(--red)";

  // Shared rank row
  const RepRow=({r,i,primary,primaryColor,secondary,barPct,barColor,highlight})=>(
    <div style={{display:"flex",alignItems:"center",gap:10,padding:i===0&&highlight?"12px 0 10px":"7px 0",borderBottom:"1px solid var(--card-border)"}}>
      <div style={{width:i===0&&highlight?34:26,height:i===0&&highlight?34:26,borderRadius:"50%",background:i<3?medalCol(i):"var(--card-border)",color:i<3?"#000":"var(--text-dim)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:i===0&&highlight?14:10,fontWeight:800,flexShrink:0,boxShadow:i===0&&highlight?"0 0 12px rgba(245,158,11,0.35)":"none"}}>{i+1}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
          <span style={{fontSize:i===0&&highlight?16:13,fontWeight:i===0&&highlight?900:700,color:i===0&&highlight?"var(--gold)":"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.rep}</span>
          {isEliteRep(r.rep)&&<span style={{fontSize:8,color:"#a78bfa",fontWeight:700}}>ELITE</span>}
          {r.ca===true&&<span style={{fontSize:8,color:"var(--cyan)",fontWeight:700}}>CA</span>}
          {r._eu&&<span style={{fontSize:8,color:"#a78bfa",fontWeight:700}}>EU</span>}
          {r.ca===false&&!r._eu&&r.hb!==undefined&&<span style={{fontSize:8,color:"var(--text-muted)"}}>US</span>}
        </div>
        <div style={{background:"var(--card-border)",borderRadius:3,height:i===0&&highlight?8:5,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:3,background:barColor||(i===0?"linear-gradient(90deg,var(--gold),#fbbf24)":i<3?"linear-gradient(90deg,var(--blue),var(--cyan))":"var(--blue-dim)"),width:`${Math.min(barPct||0,100)}%`,transition:"width .8s"}}/>
        </div>
      </div>
      <div style={{textAlign:"right",flexShrink:0,minWidth:90}}>
        <div className="mono" style={{fontSize:i===0&&highlight?20:15,fontWeight:800,color:primaryColor||(i===0?"var(--gold)":"var(--text)"),lineHeight:1}}>{primary}</div>
        {secondary&&<div className="mono" style={{fontSize:9,color:"var(--text-muted)",marginTop:2}}>{secondary}</div>}
      </div>
    </div>
  );

  return(
    <div className="fade-up">
      {/* ── REGION TOGGLE ── */}
      <div style={{display:"flex",gap:6,marginBottom:20,alignItems:"center"}}>
        {[["NA","🇨🇦🇺🇸 NA"],["ALL","🌍 Global"],["EU","🇪🇺 EU"],["USA","🇺🇸 USA"],["CAN","🇨🇦 CAN"]].map(([v,l])=>(
          <TogBtn key={v} active={region===v} onClick={()=>setRegion(v)}>{l}</TogBtn>
        ))}
      </div>

      {/* ═══════════════ S1: THIS WEEK ═══════════════ */}
      <div className="card" style={{marginBottom:20,overflow:"hidden"}}>
        <div style={{background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",padding:"18px 24px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:18,fontWeight:900,color:"#fff"}}>🔥 This Week — Incoming Orders</div>
              <div style={{fontSize:12,fontWeight:700,color:"#fff",marginTop:3,opacity:.85}}>{weeklyOrders?weeklyOrders.week_label:"No weekly data uploaded"}</div>
            </div>
            <div className="mono" style={{fontSize:28,fontWeight:900,color:"var(--gold)"}}>{fmt(weekTotal,ccy)}</div>
          </div>
        </div>
        <div className="card-body" style={{maxHeight:480,overflowY:"auto"}}>
          {weekReps.length>0?weekReps.map((r,i)=>(
            <RepRow key={r.rep} r={r} i={i} highlight
              primary={fmt(r.total,ccy)}
              barPct={weekReps[0]?r.total/weekReps[0].total*100:0}
            />
          )):<div style={{padding:20,textAlign:"center",color:"var(--text-muted)",fontSize:13}}>Upload weekly orders CSV to populate this section</div>}
        </div>
      </div>

      {/* ═══════════════ S2: PACE TO BUDGET ═══════════════ */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-head" style={{padding:"16px 24px 12px"}}>
          <div className="card-title" style={{fontSize:17}}>🏅 YTD Race — Pace to Budget</div>
          <div className="card-sub">{regionLabel} • {paceReps.length} budgeted reps</div>
        </div>
        <div className="card-body" style={{maxHeight:500,overflowY:"auto"}}>
          {paceReps.map((r,i)=>(
            <RepRow key={r.rep} r={r} i={i} highlight={false}
              primary={`${r.pct}%`}
              primaryColor={pctCol(r.pct)}
              secondary={`${fmt(r.total,ccy)} of ${fmt(r.budget,ccy)}`}
              barPct={Math.min(r.pct/80*100,100)}
              barColor={`linear-gradient(90deg,${pctCol(r.pct)},${pctCol(r.pct)}aa)`}
            />
          ))}
          {paceReps.length===0&&<div style={{padding:20,textAlign:"center",color:"var(--text-muted)",fontSize:13}}>No budgeted reps for this region</div>}
        </div>
      </div>

      {/* ═══════════════ S3: GROSS MARGIN ═══════════════ */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-head" style={{padding:"16px 24px 12px"}}>
          <div className="card-title" style={{fontSize:17}}>📈 Gross Margin Performance</div>
          <div className="card-sub">{regionLabel} • min $25K revenue • {gmReps.length} reps</div>
        </div>
        <div className="card-body" style={{maxHeight:500,overflowY:"auto"}}>
          {gmReps.map((r,i)=>(
            <RepRow key={r.rep} r={r} i={i} highlight={false}
              primary={`${r.gm}%`}
              primaryColor={gmColor(r.gm)}
              secondary={fmt(r.total,ccy)}
              barPct={r.gm}
              barColor={`linear-gradient(90deg,${gmColor(r.gm)},${gmColor(r.gm)}aa)`}
            />
          ))}
          {gmReps.length===0&&<div style={{padding:20,textAlign:"center",color:"var(--text-muted)",fontSize:13}}>No reps meet the minimum threshold</div>}
        </div>
      </div>

      {/* ═══════════════ S4: YTD REVENUE ═══════════════ */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-head" style={{padding:"16px 24px 12px"}}>
          <div className="card-title" style={{fontSize:17}}>💰 YTD Revenue</div>
          <div className="card-sub">{regionLabel} • {revReps.length} reps • {fmt(revReps.reduce((s,r)=>s+r.total,0),ccy)} total</div>
        </div>
        <div className="card-body" style={{maxHeight:500,overflowY:"auto"}}>
          {revReps.map((r,i)=>(
            <RepRow key={r.rep} r={r} i={i} highlight={false}
              primary={fmt(r.total,ccy)}
              secondary={r.pct!=null?`${r.pct}% to budget`:null}
              barPct={revReps[0]?r.total/revReps[0].total*100:0}
            />
          ))}
        </div>
      </div>

      {/* Weekly Category Breakdown */}
      {weeklyOrders&&weeklyOrders.cats.length>0&&(
        <div className="card">
          <div className="card-head" style={{padding:"16px 24px 12px"}}>
            <div className="card-title" style={{fontSize:17}}>📦 Weekly Orders — Category Breakdown</div>
            <div className="card-sub">{weeklyOrders.week_label} • {weeklyOrders.cats.length} categories</div>
          </div>
          <div className="card-body">
            {weeklyOrders.cats.map((c,i)=>{
              const max=weeklyOrders.cats[0].total||1;
              const total=weeklyOrders.cats.reduce((s,x)=>s+x.total,0);
              const pct=total>0?Math.round(c.total/total*1000)/10:0;
              const catC=["#3b82f6","#22d3ee","#10b981","#8b5cf6","#f59e0b","#ef4444","#64748b","#a78bfa","#f472b6"][i%9];
              return(
                <div key={c.cat} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<weeklyOrders.cats.length-1?"1px solid var(--card-border)":"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,width:160,flexShrink:0}}>
                    <div style={{width:10,height:10,borderRadius:5,background:catC}}/>
                    <span style={{fontSize:13,fontWeight:700}}>{c.cat}</span>
                  </div>
                  <div style={{flex:1,background:"var(--card-border)",borderRadius:4,height:8,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:4,background:catC,opacity:.7,width:`${Math.min(c.total/max*100,100)}%`,transition:"width .8s"}}/>
                  </div>
                  <div className="mono" style={{fontSize:14,fontWeight:700,textAlign:"right",minWidth:90}}>{fmt(c.total,ccy)}</div>
                  <div className="mono" style={{fontSize:11,color:"var(--text-dim)",minWidth:45,textAlign:"right"}}>{pct}%</div>
                </div>
              );
            })}
            <div style={{display:"flex",justifyContent:"space-between",padding:"12px 0 0",borderTop:"2px solid var(--card-border)",marginTop:4}}>
              <span style={{fontSize:14,fontWeight:800}}>Total</span>
              <span className="mono" style={{fontSize:16,fontWeight:900,color:"var(--gold)"}}>{fmt(weeklyOrders.cats.reduce((s,c)=>s+c.total,0),ccy)}</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


/* ══════════════════════════════════════════════════════════════════

              <div style={{fontSize:28,fontWeight:800,color:"var(--gold)"}}>{WORKHORSE.name}</div>

            <>
              <div style={{width:80,height:80,borderRadius:40,background:"var(--card-border)",margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,animation:"pulse 2s infinite"}}>❓</div>
              <div style={{fontSize:22,fontWeight:700,color:"var(--text-dim)"}}>To Be Announced</div>

            {WORKHORSE.hallOfFame.map((h,i) => (
              <div key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 0",borderBottom:i<WORKHORSE.hallOfFame.length-1?"1px solid var(--card-border)":"none"}}>
                <div style={{width:36,height:36,borderRadius:18,background:"var(--gold-dim)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🏆</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:"var(--gold)"}}>{h.name}</div>
                  <div style={{fontSize:11,color:"var(--text-dim)"}}>{h.month}{h.note?` — ${h.note}`:""}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   TAB 4: DEEP DIVE
   ══════════════════════════════════════════════════════════════════ */
function DeepDive({data,ccy,masterTeam}) {
  const [view,setView]=useState("region");
  const [regFilter,setRegFilter]=useState("NA");
  const [catGroup,setCatGroup]=useState("all");
  const [catSort,setCatSort]=useState("budget");
  const [timeframe,setTimeframe]=useState("ytd");
  const [selWeek,setSelWeek]=useState(()=>{const w=data.weekly_trend.map(x=>x.week);return w[w.length-1]||""});
  const [selMonth,setSelMonth]=useState(()=>{const m=Object.keys(data.monthly_na||{}).sort();return m[m.length-1]||""});

  const catalogCats=["Sticks","Stock Skates","Stock Goalie","Other"];
  const customCats=["Custom Skates","Custom Goalie"];
  const allCats=[...catalogCats,...customCats];
  const catColors={"Sticks":"#3b82f6","Custom Skates":"#22d3ee","Stock Skates":"#10b981","Custom Goalie":"#8b5cf6","Stock Goalie":"#f59e0b","Other":"#94a3b8"};
  const weeks=data.weekly_trend.map(w=>w.week);
  const months=useMemo(()=>{const s=new Set([...Object.keys(data.monthly_na||{}),...Object.keys(data.monthly_eu||{})]);return[...s].sort()},[data]);

  const gmColor=(gm)=>gm>=50?"var(--green)":gm>=40?"var(--gold)":"var(--red)";

  // Build rep gm lookup from d4/d6
  const repGM=useMemo(()=>{
    const m={};
    (data.d4||[]).forEach(r=>{if(r.gm!=null)m[r.rep]=r.gm});
    (data.d6||[]).forEach(r=>{if(r.gm!=null)m[r.rep]=r.gm});
    return m;
  },[data.d4,data.d6]);

  // Team filter helper — uses masterTeam from App
  const isElite=(repName)=>ELITE_REPS.has(repName);
  const teamFilter=(list)=>{
    if(masterTeam==="all")return list;
    if(masterTeam==="elite")return list.filter(r=>{const n=r.rep||r.name||"";return isElite(n)});
    return list.filter(r=>{const n=r.rep||r.name||"";return!isElite(n)});
  };

  const TogBtn=({active,onClick,children,color})=>(
    <button onClick={onClick} style={{padding:"6px 14px",borderRadius:8,background:active?(color||"var(--blue)"):"var(--card)",border:active?"none":"1px solid var(--card-border)",color:active?"#fff":"var(--text-dim)",fontSize:11,fontWeight:700,transition:"all .15s"}}>{children}</button>
  );

  // ─── Timeframe context ───
  const selWeekData=data.weekly_trend.find(w=>w.week===selWeek);
  const selMonthNA=useMemo(()=>(data.monthly_na||{})[selMonth]||[],[selMonth,data]);
  const selMonthEU=useMemo(()=>(data.monthly_eu||{})[selMonth]||[],[selMonth,data]);
  const monthTotal=useMemo(()=>{
    const na=selMonthNA.reduce((s,r)=>s+r.total,0);
    const eu=selMonthEU.reduce((s,r)=>s+r.total,0);
    return{na,eu,total:na+eu};
  },[selMonthNA,selMonthEU]);
  const monthLabel=selMonth?new Date(selMonth+"-15").toLocaleDateString("en-US",{month:"short",year:"numeric"}):"";
  const tfSummary=timeframe==="week"&&selWeekData?{na:selWeekData.na,eu:selWeekData.eu}:timeframe==="month"?{na:monthTotal.na,eu:monthTotal.eu}:null;

  // ─── Shared rep row for category rankings ───
  const CatRepRow=({e,i,color,mode})=>{
    const gm=repGM[e.rep]||null;
    const isGM=mode==="gm";
    const isBud=mode==="budget";
    const primaryVal=isGM?(gm!=null?`${gm}%`:"—"):isBud?(e.pct!=null?`${e.pct}%`:"—"):fmt(e.total,ccy);
    const primaryColor=isGM?(gm!=null?gmColor(gm):"var(--text-dim)"):isBud?pctCol(e.pct):"var(--text)";
    const secondaryVal=isGM?fmt(e.total,ccy):isBud?fmt(e.total,ccy):(e.pct!=null?`${e.pct}% to bud`:(gm!=null?`GM ${gm}%`:null));
    const barVal=isGM?(gm||0):isBud?(e.pct||0):e.total;
    const barMax=isGM?100:isBud?100:(e.total*1.3||1);
    const elite=isElite(e.rep);
    return(
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid var(--card-border)"}}>
        <div style={{width:22,height:22,borderRadius:11,background:i<3?medalCol(i):"var(--card-border)",color:i<3?"#000":"var(--text-dim)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,flexShrink:0}}>{i+1}</div>
        <div style={{width:160,flexShrink:0,overflow:"hidden"}}>
          <div style={{fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.rep}</div>
          <div style={{fontSize:9,color:"var(--text-muted)",display:"flex",gap:4}}>
            {e.ca?<span style={{color:"var(--cyan)"}}>CA</span>:<span>US</span>}
            {elite&&<span style={{color:"#a78bfa"}}>ELITE</span>}
          </div>
        </div>
        <div style={{flex:1,background:"var(--card-border)",borderRadius:3,height:5,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:3,background:color,opacity:.7,width:`${Math.min(barVal/(barMax||1)*100,100)}%`,transition:"width .8s"}}/>
        </div>
        <div style={{textAlign:"right",flexShrink:0,minWidth:90}}>
          <div className="mono" style={{fontSize:15,fontWeight:800,color:primaryColor,lineHeight:1}}>{primaryVal}</div>
          {secondaryVal&&<div className="mono" style={{fontSize:9,color:"var(--text-muted)",marginTop:2}}>{secondaryVal}</div>}
        </div>
      </div>
    );
  };

  // ═══════════════ REGION VIEW ═══════════════
  const RegionView=()=>{
    if(timeframe==="ytd"){
      return(
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-head"><div className="card-title">Sales by Region — YTD</div><div className="card-sub">Shipped, Open, and Total</div></div>
            <div className="card-body">
              <BarChart labels={data.d1.map(r=>r.region)} datasets={[
                {label:"Shipped",data:data.d1.map(r=>r.shipped),backgroundColor:"#3b82f6"},
                {label:"Open",data:data.d1.map(r=>r.open),backgroundColor:"#1e3a6e"},
                {label:"Total",data:data.d1.map(r=>r.total),backgroundColor:"#22d3ee"}
              ]} height={280} showLabels/>
            </div>
          </div>
          <div className="card">
            <div className="card-head"><div className="card-title">Region Detail</div></div>
            <div className="card-body">
              <div style={{display:"grid",gridTemplateColumns:"100px 1fr 80px 80px 90px 55px",gap:8,padding:"0 0 8px",borderBottom:"2px solid var(--card-border)"}}>
                {["Region","","Shipped","Open","Total","% Bud"].map((h,i)=>(
                  <div key={h} style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1,textAlign:i>1?"right":"left",fontWeight:700}}>{h}</div>
                ))}
              </div>
              {data.d1.map((r,i)=>(
                <div key={r.region} style={{display:"grid",gridTemplateColumns:"100px 1fr 80px 80px 90px 55px",alignItems:"center",gap:8,padding:"8px 0",borderBottom:i<data.d1.length-1?"1px solid var(--card-border)":"none",fontWeight:r.region==="GLOBAL"?700:400}}>
                  <div style={{fontSize:12,fontWeight:600}}>{r.region}</div>
                  <div style={{background:"var(--card-border)",borderRadius:3,height:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:r.region==="GLOBAL"?"var(--text)":"var(--blue)",width:`${Math.min(r.total/data.d1[data.d1.length-1].total*100,100)}%`}}/></div>
                  <div className="mono" style={{fontSize:11,textAlign:"right",color:"var(--text-dim)"}}>{fmt(r.shipped,ccy)}</div>
                  <div className="mono" style={{fontSize:11,textAlign:"right",color:"var(--text-dim)"}}>{fmt(r.open,ccy)}</div>
                  <div className="mono" style={{fontSize:12,textAlign:"right",fontWeight:600}}>{fmt(r.total,ccy)}</div>
                  <div className="mono" style={{fontSize:12,fontWeight:700,color:pctCol(r.pct),textAlign:"right"}}>{r.pct!=null?`${r.pct}%`:"N/A"}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    if(timeframe==="week"){
      return(
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-head"><div className="card-title">Weekly Sales Trend</div><div className="card-sub">NA vs EU — last 12 weeks</div></div>
            <div className="card-body">
              <BarChart labels={weeks.map(w=>w.replace(/^\d{4}-/,""))} datasets={[
                {label:"NA",data:data.weekly_trend.map(w=>w.na),backgroundColor:"#3b82f6"},
                {label:"EU",data:data.weekly_trend.map(w=>w.eu),backgroundColor:"#22d3ee"},
                {label:"Total",data:data.weekly_trend.map(w=>w.na+w.eu),backgroundColor:"#64748b"}
              ]} height={280} showLabels/>
            </div>
          </div>
          {selWeekData&&(
            <div className="card">
              <div className="card-head"><div className="card-title">Week {selWeek.replace(/^\d{4}-/,"")} Summary</div></div>
              <div className="card-body">
                <div style={{display:"grid",gridTemplateColumns:"100px 1fr 120px",gap:8,padding:"0 0 8px",borderBottom:"2px solid var(--card-border)"}}>
                  {["Region","","Revenue"].map((h,i)=>(
                    <div key={h} style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1,textAlign:i>1?"right":"left",fontWeight:700}}>{h}</div>
                  ))}
                </div>
                {[{region:"NA",val:selWeekData.na},{region:"EU",val:selWeekData.eu},{region:"Total",val:selWeekData.na+selWeekData.eu}].map((r,i)=>(
                  <div key={r.region} style={{display:"grid",gridTemplateColumns:"100px 1fr 120px",alignItems:"center",gap:8,padding:"10px 0",borderBottom:i<2?"1px solid var(--card-border)":"none",fontWeight:r.region==="Total"?700:400}}>
                    <div style={{fontSize:13,fontWeight:600}}>{r.region}</div>
                    <div style={{background:"var(--card-border)",borderRadius:3,height:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:r.region==="Total"?"var(--text)":"var(--blue)",width:`${Math.min(r.val/(selWeekData.na+selWeekData.eu)*100,100)}%`}}/></div>
                    <div className="mono" style={{fontSize:14,textAlign:"right",fontWeight:700}}>{fmt(r.val,ccy)}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // Month view
    return(
      <div>
        <div className="card" style={{marginBottom:16}}>
          <div className="card-head"><div className="card-title">Monthly Sales Trend</div><div className="card-sub">Last 12 months — NA vs EU</div></div>
          <div className="card-body">
            {(()=>{
              const recent=months.slice(-12);
              const naVals=recent.map(m=>(data.monthly_na[m]||[]).reduce((s,r)=>s+r.total,0));
              const euVals=recent.map(m=>(data.monthly_eu[m]||[]).reduce((s,r)=>s+r.total,0));
              return <BarChart labels={recent.map(m=>m.replace(/^\d{4}-/,""))} datasets={[
                {label:"NA",data:naVals,backgroundColor:"#3b82f6"},
                {label:"EU",data:euVals,backgroundColor:"#22d3ee"},
                {label:"Total",data:naVals.map((v,i)=>v+euVals[i]),backgroundColor:"#64748b"}
              ]} height={280} showLabels/>;
            })()}
          </div>
        </div>
        <div className="card">
          <div className="card-head"><div className="card-title">{monthLabel} — Top Reps</div><div className="card-sub">NA: {fmt(monthTotal.na,ccy)} | EU: {fmt(monthTotal.eu,ccy)}</div></div>
          <div className="card-body" style={{maxHeight:500,overflowY:"auto"}}>
            <div style={{display:"grid",gridTemplateColumns:"40px 1fr 1fr 100px",gap:8,padding:"0 0 8px",borderBottom:"2px solid var(--card-border)"}}>
              {["#","Rep","Region","Revenue"].map((h,i)=>(
                <div key={h} style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1,textAlign:i>2?"right":"left",fontWeight:700}}>{h}</div>
              ))}
            </div>
            {(()=>{
              const combined=[...selMonthNA.map(r=>({...r,rg:"NA"})),...selMonthEU.map(r=>({...r,rg:"EU"}))].sort((a,b)=>b.total-a.total).slice(0,20);
              return combined.map((r,i)=>(
                <div key={r.rep+r.rg} style={{display:"grid",gridTemplateColumns:"40px 1fr 1fr 100px",alignItems:"center",gap:8,padding:"8px 0",borderBottom:i<combined.length-1?"1px solid var(--card-border)":"none"}}>
                  <div style={{width:22,height:22,borderRadius:11,background:i<3?medalCol(i):"var(--card-border)",color:i<3?"#000":"var(--text-dim)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{i+1}</div>
                  <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.rep}</div>
                  <div style={{fontSize:10,color:r.rg==="NA"?"var(--blue)":"var(--cyan)",fontWeight:600}}>{r.rg}</div>
                  <div className="mono" style={{fontSize:13,textAlign:"right",fontWeight:700}}>{fmt(r.total,ccy)}</div>
                </div>
              ));
            })()}
          </div>
        </div>
      </div>
    );
  };

  // ═══════════════ CHANNEL VIEW ═══════════════
  const ChannelView=()=>{
    const isNA=regFilter==="NA";
    if(isNA){
      const chGM={};
      (data.channel_margin||[]).forEach(c=>{chGM[c.channel]=c});
      const channels=data.d2.map(c=>({...c,gm:(chGM[c.channel]||{}).gm||null}));
      const chSorted=[...channels].sort((a,b)=>(b.gm||0)-(a.gm||0));
      return(
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-head"><div className="card-title">NA Channel Performance</div><div className="card-sub">Shipped, Open, and Total — ranked by GM%</div></div>
            <div className="card-body">
              <BarChart labels={chSorted.map(c=>c.channel)} datasets={[
                {label:"Shipped",data:chSorted.map(c=>c.shipped),backgroundColor:"#3b82f6"},
                {label:"Open",data:chSorted.map(c=>c.open),backgroundColor:"#1e3a6e"},
                {label:"Total",data:chSorted.map(c=>c.total),backgroundColor:"#22d3ee"}
              ]} height={260} showLabels/>
            </div>
          </div>

          <div className="card" style={{marginBottom:16}}>
            <div className="card-head"><div className="card-title">Channel Detail — Ranked by GM%</div></div>
            <div className="card-body">
              <div style={{display:"grid",gridTemplateColumns:"130px 1fr 85px 85px 95px 65px",gap:6,padding:"0 0 8px",borderBottom:"2px solid var(--card-border)"}}>
                {["Channel","","Shipped","Open","Total","GM%"].map((h,i)=>(
                  <div key={h} style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1,textAlign:i>1?"right":"left",fontWeight:700}}>{h}</div>
                ))}
              </div>
              {chSorted.map((c,i)=>(
                <div key={c.channel} style={{display:"grid",gridTemplateColumns:"130px 1fr 85px 85px 95px 65px",gap:6,padding:"10px 0",borderBottom:i<chSorted.length-1?"1px solid var(--card-border)":"none",alignItems:"center"}}>
                  <div style={{fontSize:13,fontWeight:700}}>{c.channel}</div>
                  <div style={{background:"var(--card-border)",borderRadius:4,height:8,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:4,background:c.gm!=null?gmColor(c.gm):"var(--text-dim)",width:`${c.gm!=null?Math.min(c.gm,100):0}%`,transition:"width .8s"}}/>
                  </div>
                  <div className="mono" style={{fontSize:11,textAlign:"right",color:"var(--text-dim)"}}>{fmt(c.shipped,ccy)}</div>
                  <div className="mono" style={{fontSize:11,textAlign:"right",color:"var(--text-dim)"}}>{fmt(c.open,ccy)}</div>
                  <div className="mono" style={{fontSize:12,textAlign:"right",fontWeight:700}}>{fmt(c.total,ccy)}</div>
                  <div className="mono" style={{fontSize:13,textAlign:"right",fontWeight:800,color:c.gm!=null?gmColor(c.gm):"var(--text-dim)"}}>{c.gm!=null?`${c.gm}%`:"—"}</div>
                </div>
              ))}
            </div>
          </div>


          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div className="card">
              <div className="card-head"><div className="card-title">Key Accounts</div></div>
              <div className="card-body">{(data.d2_drill.ka||[]).map((a,i)=>(
                <div key={a.name} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<data.d2_drill.ka.length-1?"1px solid var(--card-border)":"none"}}>
                  <span style={{fontSize:11,color:"var(--text-dim)"}}>{a.name}</span><span className="mono" style={{fontSize:11,fontWeight:600}}>{fmt(a.total,ccy)}</span>
                </div>
              ))}</div>
            </div>
            <div className="card">
              <div className="card-head"><div className="card-title">Specialty</div></div>
              <div className="card-body">{(data.d2_drill.sp||[]).map((a,i)=>(
                <div key={a.name} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<data.d2_drill.sp.length-1?"1px solid var(--card-border)":"none"}}>
                  <span style={{fontSize:11,color:"var(--text-dim)"}}>{a.name}</span><span className="mono" style={{fontSize:11,fontWeight:600}}>{fmt(a.total,ccy)}</span>
                </div>
              ))}</div>
            </div>
          </div>
        </div>
      );
    } else {
      const euM=(data.channel_margin||[]).find(c=>c.channel==="EU");
      // EU sub-region aggregation
      const euSubs=useMemo(()=>{
        const subs={};
        Object.keys(EU_SUB).forEach(k=>{subs[k]={region:k,total:0,reps:[]}});
        (data.d6||[]).forEach(r=>{
          const sub=getEUSub(r.rep);
          subs[sub].total+=r.total||0;
          subs[sub].reps.push(r);
        });
        Object.values(subs).forEach(s=>{s.reps.sort((a,b)=>b.total-a.total)});
        return Object.values(subs).sort((a,b)=>b.total-a.total);
      },[data.d6]);
      const euSubTotal=euSubs.reduce((s,r)=>s+r.total,0);
      return(
        <div>
          {/* EU/ROW Tier Revenue — PRIMARY */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-head"><div className="card-title">EU/ROW Channel Revenue</div><div className="card-sub">{euM?`Overall GM: ${euM.gm}%`:"" } • Shipped, Open, and Total by Account Tier</div></div>
            <div className="card-body">
              <BarChart labels={data.d3.map(t=>t.tier)} datasets={[
                {label:"Shipped",data:data.d3.map(t=>t.shipped),backgroundColor:"#22d3ee"},
                {label:"Open",data:data.d3.map(t=>t.open),backgroundColor:"#0e7490"},
                {label:"Total",data:data.d3.map(t=>t.total),backgroundColor:"#64748b"}
              ]} height={260} showLabels/>
            </div>
          </div>

          {/* Tier Detail table */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-head"><div className="card-title">Tier Detail</div></div>
            <div className="card-body">
              <div style={{display:"grid",gridTemplateColumns:"140px 1fr 90px 90px 100px",gap:6,padding:"0 0 8px",borderBottom:"2px solid var(--card-border)"}}>
                {["Tier","","Shipped","Open","Total"].map((h,i)=>(
                  <div key={h} style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1,textAlign:i>1?"right":"left",fontWeight:700}}>{h}</div>
                ))}
              </div>
              {data.d3.map((t,i)=>(
                <div key={t.tier} style={{display:"grid",gridTemplateColumns:"140px 1fr 90px 90px 100px",gap:6,padding:"10px 0",borderBottom:i<data.d3.length-1?"1px solid var(--card-border)":"none",alignItems:"center"}}>
                  <div style={{fontSize:13,fontWeight:700}}>{t.tier}</div>
                  <div style={{background:"var(--card-border)",borderRadius:4,height:8,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:4,background:"#22d3ee",width:`${Math.min(t.total/(data.d3[0]||{total:1}).total*100,100)}%`}}/>
                  </div>
                  <div className="mono" style={{fontSize:12,textAlign:"right",color:"var(--text-dim)"}}>{fmt(t.shipped,ccy)}</div>
                  <div className="mono" style={{fontSize:12,textAlign:"right",color:"var(--text-dim)"}}>{fmt(t.open,ccy)}</div>
                  <div className="mono" style={{fontSize:13,textAlign:"right",fontWeight:700}}>{fmt(t.total,ccy)}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Sub-Region breakdown — SECONDARY */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-head"><div className="card-title">Sub-Region Overview</div><div className="card-sub">{fmt(euSubTotal,ccy)} total across {euSubs.length} sub-regions</div></div>
            <div className="card-body">
              <BarChart labels={euSubs.map(s=>s.region)} datasets={[
                {label:"Revenue",data:euSubs.map(s=>s.total),backgroundColor:euSubs.map(s=>EU_SUB_COLORS[s.region]||"#64748b")}
              ]} height={200} showLabels/>
            </div>
          </div>

          {/* Sub-region rep cards */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            {euSubs.map(sub=>(
              <div key={sub.region} className="card">
                <div className="card-head" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px 10px"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:10,height:10,borderRadius:5,background:EU_SUB_COLORS[sub.region]}}/>
                      <div className="card-title" style={{fontSize:15}}>{sub.region}</div>
                    </div>
                    <div className="card-sub">{sub.reps.length} reps</div>
                  </div>
                  <div className="mono" style={{fontSize:16,fontWeight:800}}>{fmt(sub.total,ccy)}</div>
                </div>
                <div className="card-body">
                  {sub.reps.map((r,i)=>(
                    <div key={r.rep} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<sub.reps.length-1?"1px solid var(--card-border)":"none"}}>
                      <div style={{width:22,height:22,borderRadius:11,background:i<3?medalCol(i):"var(--card-border)",color:i<3?"#000":"var(--text-dim)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{i+1}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.rep}</div>
                        <div style={{background:"var(--card-border)",borderRadius:3,height:5,marginTop:3,overflow:"hidden"}}>
                          <div style={{height:"100%",borderRadius:3,background:EU_SUB_COLORS[sub.region],opacity:.7,width:`${Math.min(r.total/(sub.reps[0]||{total:1}).total*100,100)}%`,transition:"width .8s"}}/>
                        </div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0,minWidth:80}}>
                        <div className="mono" style={{fontSize:13,fontWeight:700}}>{fmt(r.total,ccy)}</div>
                        {r.gm!=null&&<div className="mono" style={{fontSize:9,color:r.gm>=50?"var(--green)":r.gm>=40?"var(--gold)":"var(--red)"}}>{r.gm}% GM</div>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }
  };

  // ═══════════════ CATEGORY VIEW ═══════════════
  const CategoryView=()=>{
    const isNA=regFilter==="NA";
    const catData=isNA?data.d5:data.d7;
    const visibleCats=catGroup==="catalog"?catalogCats:catGroup==="custom"?customCats:allCats;

    // Overall GM% leaderboard (shown when catSort==="gm", before per-category cards)
    const overallGMLeaderboard=useMemo(()=>{
      const src=isNA?data.d4:data.d6;
      return teamFilter([...src].filter(r=>r.gm!=null&&r.total>0)).sort((a,b)=>(b.gm||0)-(a.gm||0));
    },[isNA,data.d4,data.d6,masterTeam]);

    return(
      <div>
        {/* YTD-only notice */}
        {timeframe!=="ytd"&&(
          <div style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:8,padding:"10px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14}}>⚠️</span>
            <span style={{fontSize:11,color:"var(--gold)",fontWeight:600}}>Category breakdowns are YTD only — weekly/monthly category data is not available in the source data.</span>
          </div>
        )}

        {/* Group toggle */}
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          <TogBtn active={catGroup==="all"} onClick={()=>setCatGroup("all")}>All Categories</TogBtn>
          <TogBtn active={catGroup==="catalog"} onClick={()=>setCatGroup("catalog")} color="#10b981">📦 Catalog</TogBtn>
          <TogBtn active={catGroup==="custom"} onClick={()=>setCatGroup("custom")} color="#8b5cf6">🛠 Custom</TogBtn>
        </div>

        {/* Sort toggle */}
        <div style={{display:"flex",gap:6,marginBottom:16}}>
          <TogBtn active={catSort==="budget"} onClick={()=>setCatSort("budget")}>📊 % to Budget</TogBtn>
          <TogBtn active={catSort==="revenue"} onClick={()=>setCatSort("revenue")}>💰 Revenue</TogBtn>
          <TogBtn active={catSort==="gm"} onClick={()=>setCatSort("gm")}>📈 GM%</TogBtn>
        </div>

        {/* Category summary bar */}
        <div className="card" style={{marginBottom:16}}>
          <div className="card-head"><div className="card-title">{catGroup==="catalog"?"Catalog":catGroup==="custom"?"Custom":"All"} Category Summary</div>
            <div className="card-sub">{isNA?"North America":"EU/ROW"}{catGroup==="catalog"?" • Stock & Standard Products":catGroup==="custom"?" • Made-to-Order Products":" • All Product Categories"} • YTD</div>
          </div>
          <div className="card-body">
            {visibleCats.map((cat,idx)=>{
              const cm=(data.category_mix||[]).find(c=>c.category===cat);
              if(!cm)return null;
              const catBud=isNA?Object.values(CAT_BUDGETS).reduce((s,c)=>s+(c[cat]||0),0):0;
              const catPct=catBud>0?Math.round(cm.total/catBud*1000)/10:null;
              return(
                <div key={cat} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:idx<visibleCats.length-1?"1px solid var(--card-border)":"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,width:140,flexShrink:0}}>
                    <div style={{width:10,height:10,borderRadius:5,background:catColors[cat]||"#64748b"}}/>
                    <span style={{fontSize:13,fontWeight:700}}>{cat}</span>
                  </div>
                  <div style={{flex:1,background:"var(--card-border)",borderRadius:4,height:8,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:4,background:catColors[cat]||"#64748b",width:`${Math.min(cm.total/((data.category_mix[0]||{total:1}).total)*100,100)}%`,transition:"width .8s"}}/>
                  </div>
                  <div className="mono" style={{fontSize:13,fontWeight:700,textAlign:"right",minWidth:80}}>{fmt(cm.total,ccy)}</div>
                  {cm.gm!=null&&<div className="mono" style={{fontSize:12,fontWeight:800,color:gmColor(cm.gm),textAlign:"right",minWidth:55}}>{cm.gm}%</div>}
                  {isNA&&catPct!=null&&<div style={{background:catPct>=50?"rgba(16,185,129,0.15)":catPct>=35?"rgba(245,158,11,0.15)":"rgba(239,68,68,0.15)",border:`1px solid ${pctCol(catPct)}33`,borderRadius:6,padding:"3px 8px",textAlign:"center",minWidth:55}}>
                    <div className="mono" style={{fontSize:12,fontWeight:800,color:pctCol(catPct)}}>{catPct}%</div>
                  </div>}
                </div>
              );
            })}
          </div>
        </div>

        {/* ── OVERALL GM% LEADERBOARD (GM mode only) ── */}
        {catSort==="gm"&&(
          <div className="card" style={{marginBottom:16}}>
            <div className="card-head"><div className="card-title">📈 Overall Gross Margin</div><div className="card-sub">{isNA?"NA":"EU"} reps ranked by overall GM% • {overallGMLeaderboard.length} reps</div></div>
            <div className="card-body" style={{maxHeight:420,overflowY:"auto"}}>
              <div style={{display:"grid",gridTemplateColumns:"36px 1fr 1fr 65px 90px 55px",gap:6,padding:"0 0 8px",borderBottom:"2px solid var(--card-border)"}}>
                {["#","Rep","","GM%","Revenue","% Bud"].map((h,i)=>(
                  <div key={h} style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1,textAlign:i>2?"right":"left",fontWeight:700}}>{h}</div>
                ))}
              </div>
              {overallGMLeaderboard.map((r,i)=>{
                const gm=r.gm||0;
                return(
                  <div key={r.rep} style={{display:"grid",gridTemplateColumns:"36px 1fr 1fr 65px 90px 55px",gap:6,padding:"8px 0",borderBottom:i<overallGMLeaderboard.length-1?"1px solid var(--card-border)":"none",alignItems:"center"}}>
                    <div style={{width:24,height:24,borderRadius:12,background:i<3?medalCol(i):"var(--card-border)",color:i<3?"#000":"var(--text-dim)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{i+1}</div>
                    <div style={{overflow:"hidden"}}>
                      <div style={{fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.rep}</div>
                      <div style={{fontSize:9,color:"var(--text-muted)",display:"flex",gap:4}}>
                        {r.ca?<span style={{color:"var(--cyan)"}}>CA</span>:<span>US</span>}
                        {isElite(r.rep)&&<span style={{color:"#a78bfa"}}>ELITE</span>}
                      </div>
                    </div>
                    <div style={{background:"var(--card-border)",borderRadius:3,height:6,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:3,background:gmColor(gm),opacity:.7,width:`${Math.min(gm,100)}%`,transition:"width .8s"}}/>
                    </div>
                    <div className="mono" style={{fontSize:15,fontWeight:800,color:gmColor(gm),textAlign:"right"}}>{gm}%</div>
                    <div className="mono" style={{fontSize:11,textAlign:"right",color:"var(--text-dim)"}}>{fmt(r.total,ccy)}</div>
                    <div className="mono" style={{fontSize:11,textAlign:"right",fontWeight:700,color:pctCol(r.pct)}}>{r.pct!=null?`${r.pct}%`:"N/A"}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {catSort==="gm"&&<div style={{fontSize:12,fontWeight:700,color:"var(--text-dim)",marginBottom:12,padding:"8px 0",borderBottom:"1px solid var(--card-border)"}}>By Category</div>}

        {/* Per-category rep rankings */}
        {visibleCats.map(cat=>{
          let entries=teamFilter(catData[cat]||[]);
          if(catSort==="budget"){
            if(isNA) entries=[...entries].filter(e=>e.pct!=null).sort((a,b)=>b.pct-a.pct);
            else entries=[...entries].sort((a,b)=>b.total-a.total);
          } else if(catSort==="gm"){
            entries=[...entries].filter(e=>repGM[e.rep]!=null).sort((a,b)=>(repGM[b.rep]||0)-(repGM[a.rep]||0));
          } else {
            entries=[...entries].sort((a,b)=>b.total-a.total);
          }
          if(entries.length===0)return null;
          const catTotal=entries.reduce((s,e)=>s+e.total,0);
          const catBud=isNA?Object.values(CAT_BUDGETS).reduce((s,c)=>s+(c[cat]||0),0):0;
          const catPct=catBud>0?Math.round(catTotal/catBud*1000)/10:null;
          const sortLabel=catSort==="budget"?"ranked by % to budget":catSort==="gm"?"ranked by GM%":"ranked by revenue";
          return(
            <div key={cat} className="card" style={{marginBottom:14}}>
              <div className="card-head" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px 10px"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:10,height:10,borderRadius:5,background:catColors[cat]}}/>
                    <div className="card-title" style={{fontSize:15}}>{cat}</div>
                    {customCats.includes(cat)&&<span style={{fontSize:9,background:"rgba(139,92,246,0.15)",color:"#a78bfa",padding:"2px 8px",borderRadius:4,fontWeight:700}}>CUSTOM</span>}
                    {catalogCats.includes(cat)&&cat!=="Other"&&<span style={{fontSize:9,background:"rgba(16,185,129,0.15)",color:"#34d399",padding:"2px 8px",borderRadius:4,fontWeight:700}}>CATALOG</span>}
                  </div>
                  <div className="card-sub">{entries.length} reps • {sortLabel}</div>
                </div>
                <div style={{display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1}}>YTD</div>
                    <div className="mono" style={{fontSize:14,fontWeight:700}}>{fmt(catTotal,ccy)}</div>
                  </div>
                  {isNA&&catBud>0&&<div style={{background:catPct>=50?"rgba(16,185,129,0.15)":catPct>=35?"rgba(245,158,11,0.15)":"rgba(239,68,68,0.15)",border:`1px solid ${pctCol(catPct)}33`,borderRadius:8,padding:"4px 10px",textAlign:"center"}}>
                    <div className="mono" style={{fontSize:16,fontWeight:800,color:pctCol(catPct)}}>{catPct}%</div>
                    <div style={{fontSize:8,color:"var(--text-muted)"}}>to budget</div>
                  </div>}
                </div>
              </div>
              <div className="card-body" style={{maxHeight:400,overflowY:"auto"}}>
                {entries.map((e,i)=>(
                  <CatRepRow key={e.rep} e={e} i={i} color={catColors[cat]} mode={catSort}/>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  return(
    <div className="fade-up">
      {/* ── TIMEFRAME TOGGLE ── */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{padding:"12px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:timeframe!=="ytd"?12:0,flexWrap:"wrap"}}>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text)",flexShrink:0}}>📅 Timeframe:</div>
            <div style={{display:"flex",gap:4}}>
              <TogBtn active={timeframe==="ytd"} onClick={()=>setTimeframe("ytd")}>YTD</TogBtn>
              <TogBtn active={timeframe==="week"} onClick={()=>setTimeframe("week")}>By Week</TogBtn>
              <TogBtn active={timeframe==="month"} onClick={()=>setTimeframe("month")}>By Month</TogBtn>
            </div>
            {tfSummary&&<div style={{fontSize:11,color:"var(--text-dim)",flexShrink:0,marginLeft:"auto"}}>NA: <span className="mono" style={{color:"var(--blue)",fontWeight:700}}>{fmt(tfSummary.na,ccy)}</span> | EU: <span className="mono" style={{color:"var(--cyan)",fontWeight:700}}>{fmt(tfSummary.eu,ccy)}</span></div>}
          </div>

          {timeframe==="week"&&(
            <div style={{display:"flex",gap:3,overflowX:"auto"}}>
              {weeks.map(w=>(
                <button key={w} onClick={()=>setSelWeek(w)} style={{padding:"5px 10px",borderRadius:6,background:selWeek===w?"var(--blue)":"transparent",border:selWeek===w?"none":"1px solid var(--card-border)",color:selWeek===w?"#fff":"var(--text-dim)",fontSize:10,fontWeight:600,whiteSpace:"nowrap",fontFamily:"'JetBrains Mono',monospace"}}>{w.replace(/^\d{4}-/,"")}</button>
              ))}
            </div>
          )}

          {timeframe==="month"&&(
            <div style={{display:"flex",gap:3,overflowX:"auto"}}>
              {months.slice(-12).map(m=>{
                const lbl=new Date(m+"-15").toLocaleDateString("en-US",{month:"short",year:"2-digit"});
                return <button key={m} onClick={()=>setSelMonth(m)} style={{padding:"5px 10px",borderRadius:6,background:selMonth===m?"var(--blue)":"transparent",border:selMonth===m?"none":"1px solid var(--card-border)",color:selMonth===m?"#fff":"var(--text-dim)",fontSize:10,fontWeight:600,whiteSpace:"nowrap",fontFamily:"'JetBrains Mono',monospace"}}>{lbl}</button>;
              })}
            </div>
          )}
        </div>
      </div>

      {/* ── LEVEL 1: View selector ── */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        <TogBtn active={view==="region"} onClick={()=>setView("region")}>🌎 Region</TogBtn>
        <TogBtn active={view==="channel"} onClick={()=>setView("channel")}>🏪 Channel</TogBtn>
        <TogBtn active={view==="category"} onClick={()=>setView("category")}>📦 Category</TogBtn>
      </div>

      {(view==="channel"||view==="category")&&(
        <div style={{display:"flex",gap:4,marginBottom:16}}>
          <TogBtn active={regFilter==="NA"} onClick={()=>setRegFilter("NA")}>🇨🇦🇺🇸 NA</TogBtn>
          <TogBtn active={regFilter==="EU"} onClick={()=>setRegFilter("EU")}>🇪🇺 EU / ROW</TogBtn>
        </div>
      )}

      {view==="region"&&<RegionView/>}
      {view==="channel"&&<ChannelView/>}
      {view==="category"&&<CategoryView/>}
    </div>
  );
}


/* ══════════════════════════════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════════════════════════════ */
function App() {
  const[tab,setTab]=useState("score");
  const[ccy,setCcy]=useState("USD");
  const[data,setData]=useState(DEFAULT_DATA);
  const[masterTeam,setMasterTeam]=useState("all");
  const[weeklyOrders,setWeeklyOrders]=useState(DEFAULT_WEEKLY);

  return(
    <div style={{minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(180deg,#0c1222 0%,var(--bg) 100%)",borderBottom:"1px solid var(--card-border)",padding:"0 20px"}}>
        <div style={{maxWidth:1020,margin:"0 auto",padding:"14px 0 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:10}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{fontSize:24}}>🏒</div>
              <div>
                <div style={{fontSize:10,color:"var(--blue)",textTransform:"uppercase",letterSpacing:3,fontWeight:700}}>True Sports</div>
                <div style={{fontSize:20,fontWeight:800,letterSpacing:-.5}}>Performance Dashboard</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              {/* MASTER TEAM TOGGLE */}
              <div style={{display:"inline-flex",background:"var(--card)",borderRadius:8,padding:2,border:"1px solid var(--card-border)"}}>
                <button onClick={()=>setMasterTeam("all")} style={{padding:"5px 14px",borderRadius:6,background:masterTeam==="all"?"var(--blue)":"transparent",color:masterTeam==="all"?"#fff":"var(--text-dim)",fontSize:11,fontWeight:700}}>🏒 All TRUE</button>
                <button onClick={()=>setMasterTeam("retail")} style={{padding:"5px 14px",borderRadius:6,background:masterTeam==="retail"?"#10b981":"transparent",color:masterTeam==="retail"?"#fff":"var(--text-dim)",fontSize:11,fontWeight:700}}>🏪 Retail</button>
                <button onClick={()=>setMasterTeam("elite")} style={{padding:"5px 14px",borderRadius:6,background:masterTeam==="elite"?"#8b5cf6":"transparent",color:masterTeam==="elite"?"#fff":"var(--text-dim)",fontSize:11,fontWeight:700}}>⭐ Elite</button>
              </div>
              <div style={{display:"inline-flex",background:"var(--card)",borderRadius:8,padding:2,border:"1px solid var(--card-border)"}}>
                {["USD","CAD"].map(c=><button key={c} onClick={()=>setCcy(c)} style={{padding:"5px 16px",borderRadius:6,background:ccy===c?"var(--blue)":"transparent",color:ccy===c?"#fff":"var(--text-dim)",fontSize:12,fontWeight:700}}>{c}</button>)}
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1}}>Data as of</div>
                <div className="mono" style={{fontSize:13,fontWeight:600}}>{data.as_of_date}</div>
              </div>
            </div>
          </div>
          {masterTeam!=="all"&&<div style={{background:masterTeam==="retail"?"rgba(16,185,129,0.1)":"rgba(139,92,246,0.1)",border:`1px solid ${masterTeam==="retail"?"rgba(16,185,129,0.25)":"rgba(139,92,246,0.25)"}`,borderRadius:6,padding:"6px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11}}>{masterTeam==="retail"?"🏪":"⭐"}</span>
            <span style={{fontSize:11,color:masterTeam==="retail"?"#34d399":"#a78bfa",fontWeight:600}}>{masterTeam==="retail"?"Retail View — Elite/Pro reps excluded from all rankings and leaderboards":"Elite View — Retail reps excluded, showing Elite/Pro business only"}</span>
          </div>}
          <div style={{display:"flex",gap:2}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 18px",background:tab===t.id?"var(--bg)":"transparent",color:tab===t.id?"var(--text)":"var(--text-muted)",borderRadius:"10px 10px 0 0",fontSize:12,fontWeight:tab===t.id?700:500,transition:"all .15s",display:"flex",alignItems:"center",gap:6,border:tab===t.id?"1px solid var(--card-border)":"1px solid transparent",borderBottom:tab===t.id?"1px solid var(--bg)":"none"}}>
                <span>{t.icon}</span>{t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:1020,margin:"0 auto",padding:"20px 20px 48px"}}>
        <UploadBar onUpload={setData} asOf={data.as_of_date}/>
        <WeeklyUploadBar onUpload={setWeeklyOrders} weekLabel={weeklyOrders.week_label}/>
        {tab==="score"&&<Scoreboard data={data} ccy={ccy} masterTeam={masterTeam} weeklyOrders={weeklyOrders}/>}
        {tab==="leader"&&<Leaderboards data={data} ccy={ccy} masterTeam={masterTeam} weeklyOrders={weeklyOrders}/>}
        {tab==="horse"&&<WorkHorse/>}
        {tab==="deep"&&<DeepDive data={data} ccy={ccy} masterTeam={masterTeam}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
